[service]
address = "unix:///tmp/test-whisper.sock"
log_level = "info"
max_audio_size_mb = 50

[model]
size = "small"
download_dir = "/tmp/whisper_models"
device = "cpu"
compute_type = "int8"

[inference]
beam_size = 3
vad_filter = true
vad_min_silence_ms = 500
no_speech_threshold = 0.6
log_prob_threshold = -1.0
compression_ratio_threshold = 2.4
word_timestamps = true
initial_prompt = ""

[concurrency]
max_workers = 1
cpu_threads = 2
num_workers = 1

[diarization]
enabled = false
hf_token = ""
model = "pyannote/speaker-diarization-3.1"
device = "cpu"
min_speakers = 0
max_speakers = 0
