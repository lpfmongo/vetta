[service]
address = "unix:///tmp/whisper.sock" # 0.0.0.0:50051
log_level = "info"
max_audio_size_mb = 100

[model]
size = "large-v3"
download_dir = "/tmp/whisper_models"
device = "cpu"
compute_type = "int8"
hf_token = ""

[inference]
beam_size = 5
vad_filter = true
vad_min_silence_ms = 1000
no_speech_threshold = 0.4
log_prob_threshold = -0.3
compression_ratio_threshold = 2.0
word_timestamps = true
initial_prompt = ""

[concurrency]
max_workers = 1
cpu_threads = 8
num_workers = 1

[diarization]
enabled = true
model = "pyannote/speaker-diarization-3.1"
device = "cpu"
min_speakers = 0
max_speakers = 0

[embeddings]
api_key = ""