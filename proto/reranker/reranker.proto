syntax = "proto3";

package reranker;

import "google/protobuf/struct.proto";

service RerankerService {
  rpc Rerank(RerankRequest) returns (RerankResponse);
}

message RerankRequest {
  string model = 1;
  string query = 2;
  repeated string documents = 3;
  optional int32 top_k = 4;
  optional bool truncate = 5;
  google.protobuf.Struct extra_params = 6;
}

message RerankResponse {
  string model = 1;
  repeated RerankingResult results = 2;
  Usage usage = 3;
}

message RerankingResult {
  float relevance_score = 1;
  uint32 index = 2;
  optional string document = 3;
}

message Usage {
  uint32 total_tokens = 1;
}