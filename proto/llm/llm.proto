syntax = "proto3";

package llm;

import "google/protobuf/struct.proto";

service LLMService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);

  rpc GenerateStream(GenerateRequest) returns (stream GenerateStreamResponse);
}

message GenerateRequest {
  string model = 1;
  string query = 2;
  repeated string context_chunks = 3;
  optional string system_prompt = 4;
  optional int32 max_tokens = 5;
  optional float temperature = 6;
  google.protobuf.Struct extra_params = 7;
}

message GenerateResponse {
  string text = 1;
  Usage usage = 2;
}

message GenerateStreamResponse {
  string text_delta = 1;
  bool is_finished = 2;
  optional Usage usage = 3;
}

message Usage {
  uint32 prompt_tokens = 1;
  uint32 completion_tokens = 2;
  uint32 total_tokens = 3;
}