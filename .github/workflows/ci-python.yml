name: Python CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "services/stt/**"
      - "proto/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "services/stt/**"
      - "proto/**"
      - ".github/workflows/ci-python.yml"

permissions:
  contents: read

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "services/stt/uv.lock"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install Protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Setup (venv + protobuf)
        run: just stt-setup

      - name: Check formatting
        run: just stt-format-check

      - name: Lint with Ruff
        run: just stt-lint

      - name: Type-check with mypy
        run: just stt-typecheck

      - name: Run tests
        run: just stt-test